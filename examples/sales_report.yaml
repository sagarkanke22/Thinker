# LogicLive demo screen — declarative source for `sales_report`.
#
# Loaded by examples/seed.py. Edit this file to change the demo widgets,
# then re-run `python examples/seed.py` to apply.
#
# [C014] Canonical SDUI vocab.
# [C015] base_config is dev-only (this file). logic_code can be edited
#        live in the in-app editor — those changes go to the DB, not back
#        to this file.
# [C019] Every logic_code ends with explicit `return {...}`.
#
# DATA: Widget logic queries the `orders` table (seeded by
#       examples/orders_seed.py). sqlite3 is allowlisted inside the
#       sandbox per [C007]. No embedded datasets — real SQL.

screen_id: sales_report

widgets:
  # ── inputs ────────────────────────────────────────────────────
  - widget_id: input.start_date
    base_config:
      type: input
      props:
        label: "Start date"
        kind: date
        default: "2026-05-01"
    logic_code: null

  - widget_id: input.end_date
    base_config:
      type: input
      props:
        label: "End date"
        kind: date
        default: "2026-05-15"
    logic_code: null

  # ── KPI text — total revenue across filtered window ─────────
  - widget_id: text.total_kpi
    base_config:
      type: text
      props:
        style:
          fontSize: 24
          fontWeight: 700
          color: "#1f6feb"
          margin: "12px 0 4px"
    logic_code: |
      def render(params):
          # sqlite3 is pre-injected by the sandbox (see logiclive/sandbox.py),
          # no `import` needed (and `__import__` is blocked anyway).
          start = params.get("start_date") or "2026-05-01"
          end   = params.get("end_date")   or "2026-05-31"
          print(f"[total_kpi] querying SUM(revenue) for orders {start}..{end}")
          conn = sqlite3.connect("./logiclive.db")
          try:
              total = conn.execute(
                  "SELECT COALESCE(SUM(revenue), 0) FROM orders "
                  "WHERE date BETWEEN ? AND ?",
                  (start, end),
              ).fetchone()[0]
          finally:
              conn.close()
          print(f"[total_kpi] total = {total}")
          return {"children": f"Revenue ({start} → {end}): {total:,}"}

  # ── results table — groupby product over filtered window ─────
  - widget_id: table.results
    base_config:
      type: table
      props:
        columns: ["product", "qty", "revenue"]
    logic_code: |
      def render(params):
          # sqlite3 is pre-injected by the sandbox.
          start = params.get("start_date") or "2026-05-01"
          end   = params.get("end_date")   or "2026-05-31"
          print(f"[table.results] window: {start}..{end}")
          conn = sqlite3.connect("./logiclive.db")
          try:
              rows = conn.execute(
                  "SELECT product, SUM(qty), SUM(revenue) "
                  "FROM orders WHERE date BETWEEN ? AND ? "
                  "GROUP BY product ORDER BY SUM(revenue) DESC",
                  (start, end),
              ).fetchall()
              total_orders = conn.execute(
                  "SELECT COUNT(*) FROM orders WHERE date BETWEEN ? AND ?",
                  (start, end),
              ).fetchone()[0]
          finally:
              conn.close()
          print(f"[table.results] {len(rows)} products, {total_orders} orders")
          data = [
              {"product": p, "qty": q, "revenue": r}
              for p, q, r in rows
          ]
          if data:
              data[0]["_style"] = {"background": "#e6fff0"}
              print(f"[table.results] leader: {data[0]['product']} (rev={data[0]['revenue']})")
          return {
              "data": data,
              "props": {"footer": f"{len(data)} products  ·  {total_orders} orders"},
          }

  # ── revenue chart — Plotly bar across the same window ────────
  - widget_id: chart.revenue
    base_config:
      type: chart
      props:
        title: "Revenue by product"
    logic_code: |
      def render(params):
          # sqlite3 is pre-injected by the sandbox.
          start = params.get("start_date") or "2026-05-01"
          end   = params.get("end_date")   or "2026-05-31"
          print(f"[chart.revenue] querying revenue by product {start}..{end}")
          conn = sqlite3.connect("./logiclive.db")
          try:
              rows = conn.execute(
                  "SELECT product, SUM(revenue) "
                  "FROM orders WHERE date BETWEEN ? AND ? "
                  "GROUP BY product ORDER BY SUM(revenue) DESC",
                  (start, end),
              ).fetchall()
          finally:
              conn.close()
          print(f"[chart.revenue] {len(rows)} bars: {[r[0] for r in rows]}")
          return {
              "data": [{
                  "type": "bar",
                  "x": [r[0] for r in rows],
                  "y": [r[1] for r in rows],
                  "marker": {"color": "#1f6feb"},
              }],
              "props": {
                  "layout": {
                      "title": f"Revenue by product ({start} → {end})",
                      "margin": {"l": 60, "r": 20, "t": 40, "b": 80},
                      "yaxis": {"title": "Revenue"},
                  }
              },
          }
